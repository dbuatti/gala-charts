<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366, initial-scale=1">
<title>Gala Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f5;
    --border: rgba(0,0,0,0.1);
    --text: #0d0d0d;
    --text-secondary: #555;
    --text-muted: #999;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --text-secondary: #aaa;
      --text-muted: #555;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 480px;
    padding: 48px 32px;
  }
  .header {
    margin-bottom: 40px;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
  }
  .title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: rgba(128,128,128,0.4); }
  .card-left { display: flex; flex-direction: column; gap: 4px; }
  .card-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .card-tags { display: flex; gap: 6px; margin-top: 6px; }
  .tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
  }
  .tag-green  { background: #E1F5EE; color: #085041; }
  .tag-amber  { background: #FAEEDA; color: #633806; }
  .tag-purple { background: #EEEDFE; color: #3C3489; }
  .tag-pink   { background: #FBEAF0; color: #72243E; }
  @media (prefers-color-scheme: dark) {
    .tag-green  { background: #0d2a20; color: #5DCAA5; }
    .tag-amber  { background: #2a1f08; color: #FAC775; }
    .tag-purple { background: #1e1c40; color: #AFA9EC; }
    .tag-pink   { background: #2a0f1e; color: #ED93B1; }
  }
  .arrow {
    font-size: 18px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-left: 16px;
  }
  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <p class="eyebrow">MCH Shine Gala · June 2026</p>
    <h1 class="title">MD Charts</h1>
  </div>
  <div class="cards">
    <a class="card" href="all_my_love_chart.html">
      <div class="card-left">
        <span class="card-title">All My Love</span>
        <span class="card-meta">Coldplay · A major</span>
        <div class="card-tags">
          <span class="tag tag-green">Verse</span>
          <span class="tag tag-amber">Chorus</span>
          <span class="tag tag-pink">Waltz</span>
          <span class="tag tag-purple">Intro</span>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="unstoppable_chart.html">
      <div class="card-left">
        <span class="card-title">Unstoppable</span>
        <span class="card-meta">Sia · D major</span>
        <div class="card-tags">
          <span class="tag tag-green">Verse</span>
          <span class="tag tag-purple">Pre-chorus</span>
          <span class="tag tag-amber">Chorus</span>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
  <p class="footer">Open in Safari · Add to Home Screen for fullscreen</p>
</div>
</body>
</html>
